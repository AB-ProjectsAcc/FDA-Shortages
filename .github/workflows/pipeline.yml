name: Daily FDA Pipeline

on:
  schedule:
    # Runs daily at 08:00 UTC (03:00 / 04:00 AM EST) to capture FDA overnight updates
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual trigger for testing or immediate updates

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate GCP Credentials from GitHub Secrets
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > google_credentials.json

    - name: Execute FDA ETL Pipeline
      run: python fda_pipeline.py
